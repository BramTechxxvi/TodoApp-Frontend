<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo App</title>
    <link rel="stylesheet" href="login.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
<div class="MainWrapper">
    <div class="loginBox">
        <div class="login-Logo">
            <ion-icon name="checkbox-outline"></ion-icon>
        </div>
        <div class="loginBox-main">
            <span class="icon"><ion-icon name="mail-outline"></ion-icon></span>
            <input type="email" name="input-field" id="email-input" placeholder="Email" autocomplete="off" required>
        </div>
        <div class="loginBox-main">
            <span class="icon"><ion-icon name="lock-closed-outline"></ion-icon></span>
            <input type="password" name="input-field" id="password-input" placeholder="Password" autocomplete="off" required>
        </div>
        <div class="forgot-password">
            <a href="">Forgot password</a>
        </div>
        <div class="submit">
            <button id="submit">Submit</button>
        </div>
        <div class="signUp">
            <p>Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
    </div>
</div>


</body>
</html>
