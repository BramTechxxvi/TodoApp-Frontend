<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO App</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
<div class="MainContainer">

    <header class="header">
        <div class="user-info">
            <div class="logoBox">
                <ion-icon name="checkbox-outline"></ion-icon>
            </div>
            <h1>TODOs</h1>
        </div>
        <div class="dashboard-actions">
            <div class="profile-icon">
                <ion-icon name="person-outline"></ion-icon>
            </div>
            <button onclick="logout()">Logout</button>
        </div>
    </header>   

    <aside id="search">
        <input type="search" id="searchTask" placeholder="Search here..." oninput="searchTasks()">
    </aside>
    
    <main class="task-section">
        <h2>Add a new task</h2>

        <div class="add-task">
            <input type="text" id="task-title" placeholder="Enter title..." onkeydown="handleTitleKey(event)">
            
            <div id="description-section" class="hidden">
                <input type="text" id="task-description" placeholder="Enter description...">
                <label for="task-status">Status:</label>
                <select id="task-status">
                    <option value="PENDING">Pending</option>
                    <option value="IN_PROGRESS">In Progress</option>
                    <option value="COMPLETED">Completed</option>
                </select>
            </div>
            <button onclick="addTask()">Add</button>
        </div>

        <ul id="taskList">

        </ul>
    </main>

    <div id="changeEmailForm" class="hidden">
        <input type="email" id="old-email" placeholder="Old Email">
        <input type="email" id="new-email" placeholder="New Email">
        <button onclick="changeEmail()">Update Email</button>
    </div>

    <div class="changePasswordForm">
        <input type="text" id="old-password" placeholder="Old Password">
        <input type="password" id="new-password" placeholder="New Password">
        <button onclick="changePassword()">Update Password</button>
    </div>

</div>
<!-- <script src="script.js"></script> -->
</body>
</html>
