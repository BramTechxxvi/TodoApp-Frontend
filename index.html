<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="MainContainer">

    <header class="header">
        <h1>TODO App</h1>
        <div class="user-info">
            <span id="user-email">Welcome, Bram@customer.com</span>
        </div>
        <div class="dashboard-actions">
            <button onclick="showEmailForm()">Change Email</button>
            <button onclick="showPasswordForm()">Change Password</button>
            <button onclick="logout()">Logout</button>
        </div>
    </header>   

    <aside id="search">
        <input type="search" id="searchTask" placeholder="Search here..." oninput="searchTasks()">
    </aside>
    
    <main class="task-section">
        <h2>Add a new taskj</h2>

        <div class="add-task">
            <input type="text" id="task-title" placeholder="Enter title..." onkeydown="handleTitleKey(event)">

            <div class="task-description">
                
            </div>
            <button onclick="addTask()">Add</button>
        </div>


        
        <ul id="taskList">

        </ul>
    </main>

    <div id="changeEmailForm" class="hidden">
        <input type="email" id="old-email" placeholder="Old Email">
        <input type="email" id="new-email" placeholder="New Email">
        <button onclick="changeEmail()">Update Email</button>
    </div>

    <div class="changePasswordForm">
        <input type="text" id="old-password" placeholder="Old Password">
        <input type="password" id="new-password" placeholder="New Password">
        <button onclick="changePassword()">Update Password</button>
    </div>

</div>
<script src="script.js"></script>
</body>
</html>
