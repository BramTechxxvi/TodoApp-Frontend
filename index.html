    <!DOCTYPE html>
<html>
<head>
    <title>TODO App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="MainContainer">
    <aside id="search">
        <input type="search" id="searchTask" placeholder="Search here" oninput="searchTasks()">
    </aside>

   <div class="MainWrapper">
       <h2 id="header">Task List</h2>
       <div class="add-task">
           <input type="text" id="add-task" placeholder="Add New To-Do...">
           <button onclick="addTask()">Add</button>
       </div>
       <ul id="taskList"></ul>
   </div>

</div>
<script src="script.js"></script>
</body>
</html>
